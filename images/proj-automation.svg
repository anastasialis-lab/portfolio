  <line x1="222" y1="92" x2="222" y2="89" stroke="#e8761a" stroke-width="1" opacity="0.6"/>
  <line x1="228" y1="98" x2="231" y2="98" stroke="#e8761a" stroke-width="1" opacity="0.6"/>
  <rect x="240" y="93" width="40" height="6" rx="3" fill="#c8d4f0" opacity="0.7"/>
  <rect x="240" y="103" width="30" height="4" rx="2" fill="#3a4a6a"/>
  <rect x="240" y="111" width="38" height="4" rx="2" fill="#e8761a" opacity="0.5"/>
