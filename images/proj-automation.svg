  <circle cx="374" cy="94" r="3" fill="#e8761a" opacity="0.7"/>
  <line x1="374" y1="85" x2="374" y2="87" stroke="#e8761a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="374" y1="101" x2="374" y2="103" stroke="#e8761a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="365" y1="94" x2="367" y2="94" stroke="#e8761a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="381" y1="94" x2="383" y2="94" stroke="#e8761a" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="394" y="85" width="38" height="6" rx="3" fill="#c8d4f0" opacity="0.85"/>
