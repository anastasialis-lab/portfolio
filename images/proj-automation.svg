  <!-- scenarios count -->
  <rect x="362" y="114" width="68" height="24" rx="6" fill="#0f1420"/>
  <rect x="368" y="120" width="24" height="12" rx="4" fill="#e8761a" opacity="0.15"/>
  <rect x="372" y="123" width="16" height="6" rx="2" fill="#e8761a" opacity="0.8"/>
  <rect x="400" y="120" width="24" height="12" rx="4" fill="#2dc3af" opacity="0.1"/>
