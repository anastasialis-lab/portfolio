<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1620"/>
    </linearGradient>
    <linearGradient id="anode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2c45"/>
      <stop offset="100%" stop-color="#151d2e"/>
    </linearGradient>
    <linearGradient id="afox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8761a"/>
      <stop offset="100%" stop-color="#f59e3a"/>
    </linearGradient>
    <filter id="aglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="aglow2">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8761a" opacity="0.6"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2dc3af" opacity="0.6"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="600" height="300" fill="url(#abg)"/>

  <!-- Grid dots -->
  <g opacity="0.06" fill="#8899bb">
    <circle cx="50"  cy="50"  r="1.5"/><circle cx="150" cy="50"  r="1.5"/><circle cx="250" cy="50"  r="1.5"/>
    <circle cx="350" cy="50"  r="1.5"/><circle cx="450" cy="50"  r="1.5"/><circle cx="550" cy="50"  r="1.5"/>
    <circle cx="50"  cy="150" r="1.5"/><circle cx="150" cy="150" r="1.5"/><circle cx="250" cy="150" r="1.5"/>
    <circle cx="350" cy="150" r="1.5"/><circle cx="450" cy="150" r="1.5"/><circle cx="550" cy="150" r="1.5"/>
    <circle cx="50"  cy="250" r="1.5"/><circle cx="150" cy="250" r="1.5"/><circle cx="250" cy="250" r="1.5"/>
    <circle cx="350" cy="250" r="1.5"/><circle cx="450" cy="250" r="1.5"/><circle cx="550" cy="250" r="1.5"/>
    <circle cx="100" cy="100" r="1"/><circle cx="200" cy="100" r="1"/><circle cx="300" cy="100" r="1"/>
    <circle cx="400" cy="100" r="1"/><circle cx="500" cy="100" r="1"/>
    <circle cx="100" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="300" cy="200" r="1"/>
    <circle cx="400" cy="200" r="1"/><circle cx="500" cy="200" r="1"/>
  </g>

  <!-- Ambient glow blobs -->
  <circle cx="300" cy="150" r="120" fill="#e8761a" opacity="0.025"/>
  <circle cx="480" cy="100" r="80"  fill="#2dc3af" opacity="0.03"/>
  <circle cx="120" cy="220" r="70"  fill="#8b5cf6" opacity="0.03"/>

  <!-- ═══ CONNECTIONS ═══ -->
  <!-- Trigger → OpenAI -->
  <path d="M120,108 C165,108 165,108 200,108" fill="none" stroke="#e8761a" stroke-width="1.5"
    stroke-dasharray="5,3" opacity="0.55" marker-end="url(#arr)"/>
  <!-- OpenAI → Make -->
  <path d="M288,108 C330,108 330,108 352,108" fill="none" stroke="#e8761a" stroke-width="1.5"
    stroke-dasharray="5,3" opacity="0.55" marker-end="url(#arr)"/>
  <!-- Make → Airtable top -->
  <path d="M440,90 C480,90 490,68 490,68" fill="none" stroke="#2dc3af" stroke-width="1.5"
    stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr2)"/>
  <!-- Make → Slack bottom -->
  <path d="M440,126 C480,126 490,188 490,188" fill="none" stroke="#2dc3af" stroke-width="1.5"
    stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr2)"/>
  <!-- Make → Notion -->
  <path d="M440,108 L552,108" fill="none" stroke="#8b5cf6" stroke-width="1.5"
    stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr3)"/>
  <!-- Trigger → Filter (secondary path) -->
  <path d="M120,180 C165,180 165,200 200,200" fill="none" stroke="#8b5cf6" stroke-width="1"
    stroke-dasharray="4,3" opacity="0.35" marker-end="url(#arr3)"/>
  <!-- Filter → Make bottom -->
  <path d="M288,200 C320,200 340,140 352,126" fill="none" stroke="#8b5cf6" stroke-width="1"
    stroke-dasharray="4,3" opacity="0.35" marker-end="url(#arr3)"/>

  <!-- Data packet dots on wires -->
  <circle cx="160" cy="108" r="3.5" fill="#e8761a" opacity="0.9" filter="url(#aglow)"/>
  <circle cx="320" cy="108" r="3"   fill="#e8761a" opacity="0.8"/>
  <circle cx="466" cy="94"  r="3"   fill="#2dc3af" opacity="0.85" filter="url(#aglow)"/>
  <circle cx="466" cy="140" r="3"   fill="#2dc3af" opacity="0.7"/>
  <circle cx="496" cy="108" r="2.5" fill="#8b5cf6" opacity="0.8"/>

  <!-- ═══ NODES ═══ -->
  <!-- NODE: Trigger / Webhook -->
  <rect x="24" y="78" width="96" height="60" rx="10" fill="url(#anode)" stroke="#e8761a" stroke-width="1.2"/>
  <rect x="24" y="78" width="96" height="4" rx="10" fill="#e8761a" opacity="0.8"/>
  <rect x="34" y="90" width="24" height="24" rx="6" fill="#e8761a" opacity="0.15"/>
  <!-- webhook icon -->
  <path d="M40,97 Q46,91 52,97 Q58,103 46,107" fill="none" stroke="#e8761a" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="46" cy="107" r="2" fill="#e8761a"/>
  <rect x="64" y="93" width="48" height="6" rx="3" fill="#c8d4f0" opacity="0.7"/>
