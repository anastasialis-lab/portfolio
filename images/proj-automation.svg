  <!-- NODE: Airtable -->
  <rect x="454" y="40" width="80" height="52" rx="9" fill="url(#anode)" stroke="#2a3860" stroke-width="1"/>
  <rect x="454" y="40" width="80" height="4" rx="9" fill="#2dc3af" opacity="0.7"/>
  <rect x="462" y="52" width="20" height="20" rx="5" fill="#2dc3af" opacity="0.15"/>
  <!-- table icon -->
  <rect x="465" y="56" width="14" height="3" rx="1" fill="#2dc3af" opacity="0.8"/>
  <rect x="465" y="61" width="14" height="3" rx="1" fill="#2dc3af" opacity="0.5"/>
  <rect x="465" y="66" width="14" height="3" rx="1" fill="#2dc3af" opacity="0.3"/>
  <rect x="490" y="55" width="38" height="5" rx="2" fill="#c8d4f0" opacity="0.7"/>
  <rect x="490" y="64" width="28" height="4" rx="2" fill="#3a4a6a"/>
  <rect x="490" y="72" width="34" height="10" rx="3" fill="#1a2438"/>
  <rect x="492" y="74" width="20" height="6" rx="2" fill="#2dc3af" opacity="0.5"/>

  <!-- NODE: Slack/Notify -->
  <rect x="454" y="164" width="80" height="52" rx="9" fill="url(#anode)" stroke="#2a3860" stroke-width="1"/>
  <rect x="454" y="164" width="80" height="4" rx="9" fill="#8b5cf6" opacity="0.7"/>
  <rect x="462" y="176" width="20" height="20" rx="5" fill="#8b5cf6" opacity="0.15"/>
  <!-- message icon -->
  <rect x="465" y="179" width="14" height="11" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.8"/>
  <line x1="467" y1="183" x2="477" y2="183" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  <line x1="467" y1="186" x2="474" y2="186" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>
  <rect x="490" y="179" width="36" height="5" rx="2" fill="#c8d4f0" opacity="0.7"/>
  <rect x="490" y="188" width="26" height="4" rx="2" fill="#3a4a6a"/>
  <rect x="462" y="202" width="68" height="10" rx="3" fill="#1a2438"/>
  <rect x="464" y="204" width="36" height="6" rx="2" fill="#8b5cf6" opacity="0.4"/>

  <!-- NODE: Notion -->
  <rect x="552" y="82" width="38" height="52" rx="9" fill="url(#anode)" stroke="#2a3860" stroke-width="1"/>
  <rect x="552" y="82" width="38" height="4" rx="9" fill="#8b5cf6" opacity="0.5"/>
  <rect x="558" y="95" width="26" height="5" rx="2" fill="#c8d4f0" opacity="0.6"/>
  <rect x="558" y="104" width="22" height="4" rx="2" fill="#3a4a6a"/>
  <rect x="558" y="112" width="24" height="4" rx="2" fill="#3a4a6a" opacity="0.6"/>
  <rect x="558" y="120" width="18" height="4" rx="2" fill="#8b5cf6" opacity="0.4"/>

  <!-- NODE: Filter (secondary) -->
  <rect x="200" y="168" width="88" height="52" rx="9" fill="url(#anode)" stroke="#2a3860" stroke-width="1"/>
  <rect x="200" y="168" width="88" height="4" rx="9" fill="#8b5cf6" opacity="0.5"/>
  <rect x="210" y="180" width="20" height="20" rx="5" fill="#8b5cf6" opacity="0.1"/>
  <!-- filter icon -->
  <path d="M213,183 L216,188 L216,196 L218,196 L218,188 L221,183Z" fill="#8b5cf6" opacity="0.7"/>
  <rect x="238" y="183" width="42" height="5" rx="2" fill="#c8d4f0" opacity="0.6"/>
  <rect x="238" y="192" width="32" height="4" rx="2" fill="#3a4a6a"/>
  <!-- filter rules -->
  <rect x="210" y="204" width="68" height="10" rx="3" fill="#0f1420"/>
  <rect x="212" y="206" width="20" height="6" rx="2" fill="#8b5cf6" opacity="0.5"/>
  <rect x="236" y="208" width="38" height="4" rx="2" fill="#3a4a6a" opacity="0.6"/>

  <!-- STAT STRIP at bottom -->
  <rect x="14" y="248" width="572" height="40" rx="8" fill="#0f1420" opacity="0.8"/>
  <rect x="14" y="248" width="1" height="40" fill="#e8761a" opacity="0.6"/>
  <!-- stats -->
  <rect x="30" y="257" width="50" height="5" rx="2" fill="#3a4a6a"/>
  <rect x="30" y="265" width="36" height="8" rx="3" fill="#e8761a" opacity="0.8"/>
  <line x1="110" y1="252" x2="110" y2="284" stroke="#1e2840" stroke-width="1"/>
  <rect x="122" y="257" width="60" height="5" rx="2" fill="#3a4a6a"/>
  <rect x="122" y="265" width="40" height="8" rx="3" fill="#c8d4f0" opacity="0.75"/>
  <line x1="205" y1="252" x2="205" y2="284" stroke="#1e2840" stroke-width="1"/>
  <rect x="217" y="257" width="55" height="5" rx="2" fill="#3a4a6a"/>
  <rect x="217" y="265" width="44" height="8" rx="3" fill="#2dc3af" opacity="0.8"/>
  <line x1="308" y1="252" x2="308" y2="284" stroke="#1e2840" stroke-width="1"/>
  <rect x="320" y="257" width="80" height="5" rx="2" fill="#3a4a6a"/>
  <rect x="320" y="265" width="30" height="8" rx="3" fill="#8b5cf6" opacity="0.8"/>
  <line x1="430" y1="252" x2="430" y2="284" stroke="#1e2840" stroke-width="1"/>
  <!-- progress bar -->
  <rect x="442" y="260" width="130" height="7" rx="3" fill="#1e2840"/>
  <rect x="442" y="260" width="104" height="7" rx="3" fill="#e8761a" opacity="0.7"/>
  <rect x="442" y="270" width="90" height="5" rx="2" fill="#3a4a6a" opacity="0.5"/>
