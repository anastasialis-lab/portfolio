  <rect x="64" y="111" width="28" height="4" rx="2" fill="#e8761a" opacity="0.6"/>

  <!-- NODE: OpenAI -->
  <rect x="200" y="78" width="88" height="60" rx="10" fill="url(#anode)" stroke="#2a3860" stroke-width="1"/>
  <rect x="200" y="78" width="88" height="4" rx="10" fill="#e8761a" opacity="0.4"/>
  <rect x="210" y="90" width="24" height="24" rx="6" fill="#e8761a" opacity="0.1"/>
